<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoNotes</title>
</head>
<body>
  <div id="login-screen" class="login-screen visible">
    <div class="login-card">
      <h1>GeoNotes</h1>
      <p>Save your pins and areas to the cloud</p>
      <button id="google-sign-in" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.9 7.35 2.56 10.52l7.97-5.93z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.93C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <div id="user-bar" class="user-bar">
    <img id="user-avatar" class="user-avatar" src="" alt="" />
    <span id="user-name" class="user-name"></span>
    <button id="sign-out" class="btn-sign-out" title="Sign out">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>

  <div id="map"></div>

  <div id="side-panel" class="side-panel">
    <button id="panel-close" class="panel-close">&times;</button>
    <input type="text" id="panel-title" class="panel-title" placeholder="Name" />
    <p id="panel-coords" class="panel-coords"></p>
    <div id="panel-category-select" class="category-selector panel-categories"></div>
    <p id="panel-area-stats" class="panel-area-stats" style="display: none;"></p>
    <label class="panel-label" for="panel-note">Notes</label>
    <textarea id="panel-note" class="panel-note" placeholder="Write something about this place..."></textarea>
    <div class="panel-actions">
      <button id="panel-delete" class="btn btn-delete">Delete Pin</button>
    </div>
  </div>

  <div id="pin-modal" class="modal-overlay">
    <div class="modal-box">
      <label for="pin-name-input">Pin Name</label>
      <input type="text" id="pin-name-input" placeholder="e.g. Home, Paris, ..." autocomplete="off" />
      <label for="pin-category-select" class="modal-category-label">Category</label>
      <div id="pin-category-select" class="category-selector"></div>
      <div class="modal-actions">
        <button id="pin-cancel" class="btn btn-cancel">Cancel</button>
        <button id="pin-ok" class="btn btn-ok">Place Pin</button>
      </div>
    </div>
  </div>

  <div id="confirm-modal" class="modal-overlay">
    <div class="modal-box">
      <label id="confirm-message">Are you sure?</label>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn btn-cancel">Cancel</button>
        <button id="confirm-ok" class="btn btn-delete">Clear All</button>
      </div>
    </div>
  </div>

  <div id="categories-modal" class="modal-overlay">
    <div class="modal-box categories-modal-box">
      <h2 class="categories-modal-title">Manage Categories</h2>
      <div id="categories-list" class="categories-list"></div>
      <div class="category-form">
        <input type="text" id="category-name-input" placeholder="Category name" autocomplete="off" />
        <div class="category-color-row">
          <label for="category-color-input">Color</label>
          <input type="color" id="category-color-input" value="#3b82f6" />
        </div>
        <div class="category-form-actions">
          <button id="category-cancel-btn" class="btn btn-cancel">Cancel</button>
          <button id="category-save-btn" class="btn btn-ok">Add Category</button>
        </div>
      </div>
      <div class="modal-actions" style="margin-top: 12px;">
        <button id="categories-close" class="btn btn-cancel">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
